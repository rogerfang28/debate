# Learn more: https://buf.build/docs/configuration/v2/buf-gen-yaml
version: v2

inputs:
  - directory: protos

plugins:

  # TypeScript: all protos → src/gen/ts/
  - local: protoc-gen-es
    opt:
      - target=ts
    out: src/gen/ts

  # C++ backend
  - remote: buf.build/protocolbuffers/cpp:v29.5
    out: src/gen/temp_cpp
