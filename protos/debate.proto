syntax = "proto3";

package debate;

import "google/protobuf/timestamp.proto";
import "debate_settings.proto";

// A single claim node in the debate graph
message Claim {
  int32 id = 1;
  string sentence = 2;
  string description = 3;
  int32 creator_id = 8;
  int32 debate_id = 9;
  repeated ClaimState history = 10;
  ClaimStatus status = 11;
  repeated int32 link_ids = 12;
}

enum ClaimStatus {
  NEUTRAL = 0; // unchallenged, default
  CHALLENGED = 1; // currently challenged
  DEFENDED = 2; // successfully defended against a challenge
  DISPROVEN = 3; // disproven by a challenge
}

message ClaimState {
  google.protobuf.Timestamp timestamp = 2;
  Claim claim = 1;
}

message Link {
  int32 id = 1;
  int32 connect_from = 2;
  int32 connect_to = 3;
  string connection = 4;  
  int32 creator_id = 5;
  // add a type, normal, parent child, or challenge connection
  LinkType link_type = 6;
  int32 debate_id = 7;
}

enum LinkType {
  NORMAL = 0;
  PARENT_CHILD = 1;
  CHALLENGE = 2;
}

message Challenge {
  int32 id = 1;
  ChallengeStatus status = 2;
  int32 challenged_parent_claim_id = 3;
  repeated int32 challenged_claim_ids = 4;
  repeated int32 challenged_link_ids = 5;
  string challenge_sentence = 6;
  int32 challenger_id = 7; // creator id
  int32 proof_debate_id = 8;
}

enum ChallengeStatus {
  ONGOING = 0; // challenge is ongoing
  CONCEDED = 1; // challenge has been conceded
  PROVEN = 2; // challenge successfully defended
}

message Debate {
  int32 id = 1;
  int32 root_claim_id = 2;
  string topic = 3;
  repeated int32 debater_ids = 4;
  int32 creator_id = 5;
  debate.DebateSettings settings = 6;
  bool is_challenge = 7;
  int32 parent_challenge_id = 8;
}
