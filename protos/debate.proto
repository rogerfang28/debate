syntax = "proto3";

package debate;

import "google/protobuf/timestamp.proto";
import "debate_settings.proto";

// A single claim node in the debate graph
message Claim {
  int32 id = 1;
  string sentence = 2;
  string description = 3;
  int32 creator_id = 8;
  int32 debate_id = 9;
  repeated ClaimState history = 10;
  ClaimStatus status = 11;
  repeated int32 link_ids = 12;
}

enum ClaimStatus {
  UNDETERMINED = 0; // default, no resolution yet
  TRUE_CLAIM = 1; // claim upheld / defended against challenge
  FALSE_CLAIM = 2; // claim disproven by challenge
}

message ClaimState {
  google.protobuf.Timestamp timestamp = 2;
  Claim claim = 1;
}

message Link {
  int32 id = 1;
  int32 connect_from = 2;
  int32 connect_to = 3;
  string connection = 4;  
  int32 creator_id = 5;
  // add a type, normal, parent child, or challenge connection
  LinkType link_type = 6;
  int32 debate_id = 7;
}

enum LinkType {
  NORMAL = 0;
  PARENT_CHILD = 1;
  CHALLENGE = 2;
}

message Debate {
  int32 id = 1;
  int32 root_claim_id = 2;
  string topic = 3;
  repeated int32 debater_ids = 4;
  int32 creator_id = 5;
  debate.DebateSettings settings = 6;
  bool is_challenge = 7;
  int32 parent_challenge_id = 8;
}
