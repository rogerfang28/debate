syntax = "proto3";

package ui;

message Page {
  string page_id = 1;                 // Unique page identifier
  string title = 2;                   // Page title (optional)
  repeated Component components = 3;  // Top-level components
}

message Component {
  string id = 1;                       // Unique component ID
  string name = 2;                      // Component name
  ComponentType type = 3;              // Predefined component type
  string text = 4;                     // I don't know what I'll replace this with if I remove it, maybe just making components each have their own classes
  repeated Component children = 5;     // Nested components
  Style style = 6;                     // Tailwind / structured style info
  map<string, string> css = 8;         // Arbitrary inline CSS (fallback/flexibility)
  map<string, string> attributes = 7;  // Arbitrary HTML attributes (e.g., data-* attrs)
  // string value = 9;                   // Default or bound value
  // Graph data — only used when type == GRAPH
  repeated GraphNode nodes = 10;
  repeated GraphEdge edges = 11;
  string selected_node_id = 12;
  string selected_edge_id = 13;
}

enum ComponentType {
  UNKNOWN = 0;
  TEXT = 1;
  BUTTON = 2;
  INPUT = 3;
  GRAPH = 4;
  CONTAINER = 12;
}

message Style {
  string custom_class = 1;            // Any extra Tailwind classes FOR NOW WE ONLY USING THIS
}

enum LayoutType {
  ABSLT = 0;
  FLEX_ROW = 1;
  FLEX_COL = 2;
  GRID = 3;
  INLINE = 4;
}

message Position {
  float x = 1; // px or % depending on renderer
  float y = 2;
  string unit = 3; // "px", "%", "rem"
}

message Size {
  string width = 1;  // Tailwind width class or explicit value
  string height = 2; // Tailwind height class or explicit value
}

message GraphNode {
  string id = 1;          // Unique node identifier
  string text = 2;        // Claim/sentence text
  double x = 3;           // Optional initial x position
  double y = 4;           // Optional initial y position
  string type = 5;        // "claim" | "evidence" | "challenge" | ""
  string status = 6;      // "TRUE_CLAIM" | "FALSE_CLAIM" | "UNDETERMINED"
  int32 creator_id = 7;   // Creator user ID
  bool is_root = 8;       // Renders larger if true
  bool is_current = 9;    // Highlights with yellow stroke if true
}

message GraphEdge {
  string id = 1;          // Unique edge identifier
  string source = 2;      // Source node ID
  string target = 3;      // Target node ID
  string type = 4;        // "supports" | "challenges" | "counters" | "PARENT_CHILD" | "CHALLENGE"
}

message GraphComponent {
  string id = 1;                    // Component ID
  repeated GraphNode nodes = 2;     // Debate tree nodes
  repeated GraphEdge edges = 3;     // Edges between nodes
  string selected_node_id = 4;      // Initially selected node
  string selected_edge_id = 5;      // Initially selected edge
}

