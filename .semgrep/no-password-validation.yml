rules:
  - id: no-password-hash
    message: "CRITICAL: No password hashing. updateUserPassword() always returns false. System has no actual authentication."
    languages: [cpp]
    severity: CRITICAL
    pattern: "return false;"
    metadata:
      category: security
      subcategory: auth
      owasp: "A02:2021 - Cryptographic Failures"
      source: "manual-audit"
    paths:
      include:
        - backend/src/database/handlers/UserDatabase.cc
    fix: "Implement bcrypt or Argon2id password hashing"

  - id: no-input-validation
    message: "HIGH: No input validation on user-provided strings. Topics, claims, challenges stored raw."
    languages: [cpp]
    severity: HIGH
    pattern: |
      set_topic($X)
    metadata:
      category: security
      subcategory: input-validation
      owasp: "A03:2021 - Injection"
      source: "manual-audit"

  - id: no-input-validation-2
    message: "HIGH: No input validation on user-provided strings. Claim text stored raw."
    languages: [cpp]
    severity: HIGH
    pattern: |
      set_sentence($X)
    metadata:
      category: security
      subcategory: input-validation
      owasp: "A03:2021 - Injection"
      source: "manual-audit"
